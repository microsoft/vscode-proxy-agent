# stunnel provides the TLS-terminating HTTPS proxy port. It accepts TLS on 3128
# (presenting the localhost server certificate) and forwards the decrypted proxy
# traffic to Squid's plaintext, localhost-only port, where SSL-Bump intercepts
# the tunneled TLS connections.

foreground = yes
pid =
debug = 4
output = /dev/stdout

[https-proxy]
accept = 0.0.0.0:3128
connect = 127.0.0.1:3130
cert = /etc/squid/ssl/proxy.crt
key = /etc/squid/ssl/proxy.key
