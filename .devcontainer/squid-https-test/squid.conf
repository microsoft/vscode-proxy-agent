# Minimal Squid configuration for a TLS-intercepting proxy.
#
# The TLS-terminating proxy port is provided by stunnel (see stunnel.conf), which
# forwards the decrypted proxy traffic to this plaintext, localhost-only port.
# Squid is a normal HTTP forward proxy here; SSL-Bump intercepts (bumps) the
# tunneled TLS connections established via CONNECT. The CA (ca.crt / ca.key) is
# the signing CA for the per-host certificates Squid generates on the fly.
# (Squid only allows ssl-bump on http_port for explicit forward proxies, not on
# an explicit https_port.)

http_port 127.0.0.1:3130 ssl-bump cert=/etc/squid/ssl/ca.crt key=/etc/squid/ssl/ca.key \
    generate-host-certificates=on dynamic_cert_mem_cache_size=20MB

sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 20MB
sslcrtd_children 5

acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

http_access allow all

# Squid runs as the 'proxy' user and cannot write to /dev/stdout, so log to
# files under /var/log/squid; the `squid` task tails them into the terminal.
logfile_rotate 0
access_log stdio:/var/log/squid/access.log squid

coredump_dir /var/spool/squid
